# Render Blueprint — Web Service for the FastAPI backend.
# Python 3.10.x + pinned deps for numpy/tensorflow/deepface wheels on Render.
#
# After deploy, set VITE_API_URL on Vercel to this service origin; set CORS_ORIGINS here to your Vercel URL.

services:
  - type: web
    name: faceshield-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.13"
      - key: CORS_ORIGINS
        sync: false
      - key: MAX_IMAGE_SIZE_MB
        value: "10"
      - key: DEEPFACE_MODEL
        value: Facenet
      - key: USE_DEEPFACE
        value: "0"
